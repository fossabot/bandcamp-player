name: Semgrep
on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  semgrep:
    name: Scan
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep:1.164.0 
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Run Semgrep CI
        run: semgrep ci