name: Build & Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-desktop-windows:
    name: Build Desktop (Windows)
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Package Windows
        run: npm run package -- --win --x64 --arm64 -p never


      - name: Upload Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: desktop-windows
          path: |
            release/*.exe
            release/*.msi
            release/*.yml
            release/*.blockmap

  build-desktop-linux:
    name: Build Desktop (Linux)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Package
        run: npm run package -- -p never


      - name: Upload Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: desktop-linux
          path: |
            release/*.AppImage
            release/*.deb
            release/*.rpm
            release/*.yml
            release/*.blockmap

  build-desktop-macos:
    name: Build Desktop (MacOS)
    runs-on: macos-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Package MacOS
        run: npm run package -- --mac --x64 --arm64 -p never


      - name: Upload Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: desktop-macos
          path: |
            release/*.dmg
            release/*.zip
            release/*.yml
            release/*.blockmap

  build-android:
    name: Build Android (APK)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: 'mobile/package-lock.json'

      - name: Install dependencies
        run: |
          cd mobile
          npm ci

      - name: Prebuild Android
        run: |
          cd mobile
          npx expo prebuild --platform android

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'



      - name: Check disk space
        run: df -h

      - name: Build APK
        env:
          GRADLE_OPTS: '-Dorg.gradle.jvmargs="-Xmx4g -XX:MaxMetaspaceSize=1g" -Dorg.gradle.caching=true -Dorg.gradle.configureondemand=true -Dorg.gradle.parallel=true'
        run: |
          cd mobile/android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Rename Artifacts
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          mv mobile/android/app/build/outputs/apk/release/app-release.apk mobile/android/app/build/outputs/apk/release/beta-player-"$REF_NAME"-android.apk

      - name: Upload Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: mobile-android
          path: |
            mobile/android/app/build/outputs/apk/release/*.apk

